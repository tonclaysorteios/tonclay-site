<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TonClay Sorteios</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
    body { background:#020617; color:white; display:flex; justify-content:center; }
    .container { max-width:500px; width:100%; padding:20px; text-align:center; }
    .logo { width:100px; border-radius:50%; border:3px solid #22c55e; box-shadow:0 0 20px #22c55e; margin-bottom:10px; }
    h1 { font-size:22px; }
    .prize { font-size:30px; color:#22c55e; margin:15px 0; font-weight:bold; }
    .card { background:#1e293b; padding:20px; border-radius:10px; margin-bottom:15px; }
    input { width:100%; padding:12px; margin:6px 0; border-radius:8px; border:none; outline:none; }
    button { width:100%; padding:14px; background:#22c55e; border:none; border-radius:8px; color:white; font-size:16px; cursor:pointer; }
    .pix-box { display:none; margin-top:15px; text-align:center; }
    .pix-code { background:#111; padding:10px; border-radius:6px; font-size:12px; word-break:break-all; margin-bottom:10px; }
    .copy-btn { background:#3b82f6; margin-top:5px; }
    .status-box { display:none; margin-top:15px; background:#0f172a; padding:15px; border-radius:10px; }
    .numero-box { font-size:22px; font-weight:bold; color:#22c55e; margin-top:10px; }
    .small { font-size:13px; color:#cbd5e1; margin-top:10px; word-break:break-all; }
    .link-btn {
      display:block;
      margin-top:10px;
      background:#f59e0b;
      padding:10px;
      border-radius:8px;
      text-decoration:none;
      color:white;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="perfil.png" class="logo" alt="Logo TonClay Sorteios">
  <h1>TonClay Sorteios</h1>
  <div class="prize">R$300 NO PIX</div>

  <div class="card">
    <h3>Participar</h3>
    <input id="name" placeholder="Seu nome">
    <input id="whatsapp" placeholder="WhatsApp">
    <input id="email" placeholder="Seu email real">
    <button onclick="gerarPagamento()">🔥 Garantir meu número</button>

    <div class="pix-box" id="pixBox">
      <p>Escaneie ou copie o Pix:</p>

      <div class="pix-code" id="pixCode"></div>

      <button class="copy-btn" onclick="copiarPix()">📋 Copiar Pix</button>

      <img id="qrImg" style="width:200px; margin-top:10px; display:none;" alt="QR Code Pix">

      <a id="ticketLink" class="link-btn" href="#" target="_blank" style="display:none;">
        Abrir cobrança
      </a>

      <p id="mensagemPagamento" class="small">
        Pagamento gerado. Assim que o pagamento for aprovado, seu número aparecerá automaticamente abaixo.
      </p>

      <p id="paymentIdBox" class="small"></p>
    </div>

    <div class="status-box" id="statusBox">
      <p id="statusTexto">Aguardando pagamento...</p>
      <div class="numero-box" id="numeroBox"></div>
    </div>
  </div>
</div>

<script>
let paymentId = null;
let intervaloStatus = null;

async function gerarPagamento() {
  const nome = document.getElementById('name').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!nome) {
    alert('Preencha seu nome');
    return;
  }

  if (!email) {
    alert('Preencha um email real');
    return;
  }

  try {
    paymentId = null;
    if (intervaloStatus) {
      clearInterval(intervaloStatus);
      intervaloStatus = null;
    }

    document.getElementById('pixBox').style.display = 'none';
    document.getElementById('statusBox').style.display = 'none';
    document.getElementById('pixCode').innerText = '';
    document.getElementById('qrImg').src = '';
    document.getElementById('qrImg').style.display = 'none';
    document.getElementById('ticketLink').href = '#';
    document.getElementById('ticketLink').style.display = 'none';
    document.getElementById('paymentIdBox').innerText = '';
    document.getElementById('statusTexto').innerText = 'Aguardando pagamento...';
    document.getElementById('numeroBox').innerText = '';

    const response = await fetch('https://tonclay-backend.onrender.com/criar-pagamento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, email, whatsapp })
    });

    const data = await response.json();

    if (!response.ok) {
      console.error(data);
      alert('Erro ao gerar pagamento');
      return;
    }

    paymentId = data.id;

    document.getElementById('pixCode').innerText = data.qr_code || '';
    if (data.qr_code_base64) {
      document.getElementById('qrImg').src = "data:image/png;base64," + data.qr_code_base64;
      document.getElementById('qrImg').style.display = 'block';
    }

    if (data.ticket_url) {
      document.getElementById('ticketLink').href = data.ticket_url;
      document.getElementById('ticketLink').style.display = 'block';
    }

    document.getElementById('pixBox').style.display = 'block';
    document.getElementById('statusBox').style.display = 'block';
    document.getElementById('statusTexto').innerText = '⏳ Aguardando pagamento...';
    document.getElementById('paymentIdBox').innerText = 'ID do pagamento: ' + paymentId;

    iniciarConsultaStatus();
  } catch (error) {
    console.error(error);
    alert('Erro ao gerar pagamento');
  }
}

function copiarPix() {
  const pix = document.getElementById('pixCode').innerText;
  if (!pix) {
    alert('Nenhum código Pix disponível.');
    return;
  }
  navigator.clipboard.writeText(pix);
  alert('Pix copiado!');
}

function iniciarConsultaStatus() {
  if (!paymentId) return;

  if (intervaloStatus) {
    clearInterval(intervaloStatus);
  }

  consultarStatus();

  intervaloStatus = setInterval(() => {
    consultarStatus();
  }, 5000);
}

async function consultarStatus() {
  if (!paymentId) return;

  try {
    const response = await fetch(`https://tonclay-backend.onrender.com/status-pagamento/${paymentId}`);
    const data = await response.json();

    if (!response.ok) {
      console.error(data);
      document.getElementById('statusTexto').innerText = '⏳ Aguardando pagamento...';
      document.getElementById('numeroBox').innerText = '';
      return;
    }

    if (data.status === 'approved' && data.numero !== null && data.numero !== undefined) {
      document.getElementById('statusTexto').innerText = '✅ Pagamento aprovado!';
      document.getElementById('numeroBox').innerText = 'Seu número é: ' + String(data.numero).padStart(2, '0');

      if (intervaloStatus) {
        clearInterval(intervaloStatus);
        intervaloStatus = null;
      }
    } else {
      document.getElementById('statusTexto').innerText = '⏳ Aguardando pagamento...';
      document.getElementById('numeroBox').innerText = '';
    }
  } catch (error) {
    console.error('Erro ao consultar status:', error);
    document.getElementById('statusTexto').innerText = '⏳ Aguardando pagamento...';
    document.getElementById('numeroBox').innerText = '';
  }
}
</script>

</body>
</html>
