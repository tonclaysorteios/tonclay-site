<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TonClay Sorteios</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display:flex;
  justify-content:center;
  padding:20px;
}

/* CONTAINER */
.container {
  width:100%;
  max-width:500px;
}

/* HEADER */
.header {
  text-align:center;
  margin-bottom:20px;
}

.logo {
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid #22c55e;
  margin-bottom:10px;
}

.title {
  font-size:28px;
  font-weight:bold;
}

.subtitle {
  font-size:13px;
  color:#cbd5e1;
}

/* CARD */
.card {
  background:#111827;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* PRIZE */
.prize-box {
  text-align:center;
  margin-bottom:20px;
}

.prize {
  font-size:36px;
  color:#22c55e;
  font-weight:bold;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0%{opacity:1;}
  50%{opacity:0.6;}
  100%{opacity:1;}
}

/* PROGRESS */
.progress-box {
  margin-top:15px;
}

.progress-bar {
  width:100%;
  height:10px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

.progress-fill {
  width:65%;
  height:100%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
}

/* INPUTS */
.input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  background:#1f2937;
  color:white;
}

/* BUTTON */
.button {
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
  cursor:pointer;
  margin-top:10px;
  box-shadow:0 10px 25px rgba(34,197,94,0.4);
  transition:0.2s;
}

.button:hover {
  transform:scale(1.03);
}

/* PIX */
.pix-box {
  display:none;
  margin-top:20px;
  text-align:center;
}

.pix-code {
  background:#020617;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  margin-bottom:10px;
}

.number {
  background:#22c55e;
  color:black;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  margin:5px;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="perfil.png" class="logo">
    <div class="title">TonClay Sorteios</div>
    <div class="subtitle">Ganhe dinheiro no PIX com apenas um número</div>
  </div>

  <div class="card">

    <div class="prize-box">
      <div>PRÊMIO</div>
      <div class="prize">R$300</div>

      <div class="progress-box">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <small>65% dos números vendidos</small>
      </div>
    </div>

    <input class="input" id="name" placeholder="Seu nome">
    <input class="input" id="whatsapp" placeholder="WhatsApp">
    <input class="input" id="email" placeholder="Email">

    <select class="input" id="quantidade">
      <option value="1">1 número</option>
      <option value="3">3 números</option>
      <option value="5">5 números</option>
      <option value="10">10 números</option>
    </select>

    <button class="button" onclick="gerarPagamento()">
      🚀 PARTICIPAR AGORA
    </button>

    <div class="pix-box" id="pixBox">
      <div class="pix-code" id="pixCode"></div>
      <img id="qrImg" width="200">
      <div id="numbers"></div>
    </div>

  </div>

</div>

<script>
let paymentId = null;

async function gerarPagamento(){
  const nome = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const whatsapp = document.getElementById('whatsapp').value;
  const quantidade = document.getElementById('quantidade').value;

  const res = await fetch('https://tonclay-backend.onrender.com/criar-pagamento',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({nome,email,whatsapp,quantidade})
  });

  const data = await res.json();

  paymentId = data.id;

  document.getElementById('pixBox').style.display = 'block';
  document.getElementById('pixCode').innerText = data.qr_code;
  document.getElementById('qrImg').src = "data:image/png;base64," + data.qr_code_base64;

  verificar();
}

async function verificar(){
  setInterval(async ()=>{
    const res = await fetch(`https://tonclay-backend.onrender.com/status-pagamento/${paymentId}`);
    const data = await res.json();

    if(data.status === "approved"){
      const box = document.getElementById('numbers');
      box.innerHTML = '';

      data.numeros.forEach(n=>{
        box.innerHTML += `<div class="number">${n}</div>`;
      });
    }
  },3000);
}
</script>

</body>
</html>
