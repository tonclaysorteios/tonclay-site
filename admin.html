<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TonClay Admin Pro</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
}

.box {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
  font-weight: bold;
}

.btn {
  background: #22c55e;
  color: white;
}

.approved-row {
  background: rgba(34,197,94,0.12);
  border-left: 4px solid #22c55e;
}

.number {
  background: #22c55e;
  padding: 5px;
  border-radius: 5px;
  margin: 2px;
  display: inline-block;
}

.status-ok {
  color: #22c55e;
}

.status-pend {
  color: orange;
}
</style>
</head>

<body>

<h1>TonClay Admin</h1>

<div style="color:#94a3b8;">
🔴 Sistema online • Atualizando em tempo real
</div>

<div class="box">
<input id="token" placeholder="Senha">
<button class="btn" onclick="carregar()">Entrar</button>
</div>

<div class="box">
<input id="numeroBusca" placeholder="Buscar número">
<button onclick="buscar()">Buscar</button>
<div id="resultadoBusca"></div>
</div>

<div class="box">
<button onclick="federal()">Conferir Federal</button>
<div id="resultadoFederal"></div>
</div>

<div class="box">
<table border="1" width="100%">
<thead>
<tr>
<th>Nome</th>
<th>WhatsApp</th>
<th>Status</th>
<th>Valor</th>
<th>Números</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>
</div>

<script>
let pedidos = [];

async function carregar() {
  const token = document.getElementById('token').value;

  const res = await fetch(`https://tonclay-backend.onrender.com/admin-pedidos?token=${token}`);
  const data = await res.json();

  pedidos = data.pedidos;

  render(pedidos);
}

function render(lista) {
  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  lista.forEach(p => {

    const tr = document.createElement('tr');

    if (p.status === 'approved') tr.classList.add('approved-row');

    tr.innerHTML = `
      <td>${p.nome}</td>
      <td>${p.whatsapp}</td>
      <td>${p.status === 'approved' ? '<span class="status-ok">Aprovado</span>' : '<span class="status-pend">Pendente</span>'}</td>
      <td>
        <span style="
          background: rgba(34,197,94,0.15);
          padding:6px 10px;
          border-radius:10px;
          font-weight:900;
          color:#86efac;
        ">
          R$ ${Number(p.valor).toFixed(2).replace('.', ',')}
        </span>
      </td>
      <td>
        ${(p.numeros || []).map(n => `<span class="number">${n}</span>`).join('')}
      </td>
    `;

    tabela.appendChild(tr);
  });
}

async function buscar() {
  const token = document.getElementById('token').value;
  const numero = document.getElementById('numeroBusca').value;

  const res = await fetch(`https://tonclay-backend.onrender.com/admin-buscar-numero/${numero}?token=${token}`);
  const data = await res.json();

  document.getElementById('resultadoBusca').innerHTML =
    data.pedido
    ? `<b>${data.pedido.nome}</b> - ${data.pedido.whatsapp}`
    : 'Não encontrado';
}

async function federal() {
  const token = document.getElementById('token').value;

  const res = await fetch(`https://tonclay-backend.onrender.com/admin-resultado-federal?token=${token}`);
  const data = await res.json();

  document.getElementById('resultadoFederal').innerHTML =
    JSON.stringify(data, null, 2);
}

setInterval(() => {
  carregar();
}, 10000);

</script>

</body>
</html>
