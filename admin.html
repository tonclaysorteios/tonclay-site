<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TonClay Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 14px;
    }

    .login-box, .stats-box, .table-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    input, button {
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
    }

    input {
      flex: 1;
      min-width: 260px;
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      outline: none;
    }

    button {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
    }

    .error {
      display: none;
      background: rgba(127,29,29,0.95);
      border: 1px solid rgba(248,113,113,0.35);
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
      font-size: 13px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
    }

    .stat-label {
      color: #cbd5e1;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #22c55e;
    }

    .table-scroll {
      overflow-x: auto;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      text-align: left;
      padding: 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      vertical-align: top;
      font-size: 14px;
    }

    th {
      color: #cbd5e1;
      font-size: 13px;
      text-transform: uppercase;
    }

    .status {
      padding: 8px 12px;
      border-radius: 999px;
      display: inline-block;
      font-weight: bold;
      font-size: 12px;
    }

    .pending {
      background: rgba(245,158,11,0.15);
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,0.35);
    }

    .approved {
      background: rgba(34,197,94,0.15);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.35);
    }

    .numbers {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .number-pill {
      min-width: 42px;
      text-align: center;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.35);
      color: #86efac;
      font-weight: bold;
    }

    .muted {
      color: #94a3b8;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 700px) {
      .title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">TonClay Admin</div>
      <div class="subtitle">Acompanhe quem comprou, status do pagamento e quais números pertencem a cada pessoa.</div>
    </div>

    <div class="login-box">
      <strong>Entrar no painel</strong>
      <div class="row">
        <input id="token" type="password" placeholder="Digite a senha do painel">
        <button onclick="carregarPedidos()">Entrar</button>
        <button class="secondary" onclick="carregarPedidos()">Atualizar</button>
      </div>
      <div class="error" id="errorBox"></div>
    </div>

    <div class="stats-box hidden" id="statsBox">
      <strong>Resumo</strong>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total de pedidos</div>
          <div class="stat-value" id="totalPedidos">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pagamentos aprovados</div>
          <div class="stat-value" id="totalAprovados">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pagamentos pendentes</div>
          <div class="stat-value" id="totalPendentes">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Números vendidos</div>
          <div class="stat-value" id="totalNumeros">0</div>
        </div>
      </div>
    </div>

    <div class="table-box hidden" id="tableBox">
      <strong>Participantes</strong>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>WhatsApp</th>
              <th>Email</th>
              <th>Status</th>
              <th>Qtd</th>
              <th>Valor</th>
              <th>Números</th>
              <th>Payment ID</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="tabelaPedidos"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function mostrarErro(texto) {
      const box = document.getElementById('errorBox');
      box.style.display = 'block';
      box.innerText = texto;
    }

    function esconderErro() {
      const box = document.getElementById('errorBox');
      box.style.display = 'none';
      box.innerText = '';
    }

    function formatarStatus(status) {
      if (status === 'approved') {
        return '<span class="status approved">Aprovado</span>';
      }
      return '<span class="status pending">Pendente</span>';
    }

    function formatarNumeros(numeros) {
      if (!Array.isArray(numeros) || numeros.length === 0) {
        return '<span class="muted">—</span>';
      }

      return `
        <div class="numbers">
          ${numeros.map(n => `<div class="number-pill">${String(n).padStart(2, '0')}</div>`).join('')}
        </div>
      `;
    }

    function formatarData(dataIso) {
      if (!dataIso) return '—';

      const data = new Date(dataIso);
      return data.toLocaleString('pt-BR');
    }

    async function carregarPedidos() {
      const token = document.getElementById('token').value.trim();

      if (!token) {
        mostrarErro('Digite a senha do painel.');
        return;
      }

      try {
        esconderErro();

        const response = await fetch(`https://tonclay-backend.onrender.com/admin-pedidos?token=${encodeURIComponent(token)}`);
        const data = await response.json();

        if (!response.ok) {
          mostrarErro(data.erro || 'Erro ao acessar painel.');
          return;
        }

        const pedidos = Array.isArray(data.pedidos) ? data.pedidos : [];

        document.getElementById('statsBox').classList.remove('hidden');
        document.getElementById('tableBox').classList.remove('hidden');

        document.getElementById('totalPedidos').innerText = pedidos.length;
        document.getElementById('totalAprovados').innerText = pedidos.filter(p => p.status === 'approved').length;
        document.getElementById('totalPendentes').innerText = pedidos.filter(p => p.status !== 'approved').length;
        document.getElementById('totalNumeros').innerText = pedidos.reduce((acc, p) => acc + (Array.isArray(p.numeros) ? p.numeros.length : 0), 0);

        const tbody = document.getElementById('tabelaPedidos');
        tbody.innerHTML = '';

        pedidos.forEach(pedido => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${pedido.nome || '—'}</td>
            <td>${pedido.whatsapp || '—'}</td>
            <td>${pedido.email || '—'}</td>
            <td>${formatarStatus(pedido.status)}</td>
            <td>${pedido.quantidade || 1}</td>
            <td>R$ ${(Number(pedido.valor || 0)).toFixed(2).replace('.', ',')}</td>
            <td>${formatarNumeros(pedido.numeros)}</td>
            <td><span class="muted">${pedido.paymentId || '—'}</span></td>
            <td>${formatarData(pedido.criadoEm)}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (error) {
        console.error(error);
        mostrarErro('Falha ao carregar pedidos.');
      }
    }
  </script>
</body>
</html>
